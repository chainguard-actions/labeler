name: Test basic labeler usage
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_EVENT_NAME: pull_request
      GITHUB_REF: refs/pull/1/merge
      GITHUB_HEAD_REF: feature-branch
      GITHUB_BASE_REF: main
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up labeler config
        run: |
          mkdir -p .github
          cp $GITHUB_WORKSPACE/actions/hardened/actions--labeler/v6.1.0/tests/fixtures/labeler.yml .github/labeler.yml

      - id: action
        uses: .
        continue-on-error: true
        with:
          repo-token: ${{ github.token }}
          configuration-path: .github/labeler.yml
          sync-labels: false
          dot: true

      - name: Assert action ran (may fail due to no real PR context)
        run: |
          echo "Action outcome: ${{ steps.action.outcome }}"
          echo "new-labels: ${{ steps.action.outputs.new-labels }}"
          echo "all-labels: ${{ steps.action.outputs.all-labels }}"
          # The action is expected to either succeed or fail gracefully
          # without a real PR context in act. We just verify it ran.
          if [ "${{ steps.action.outcome }}" = "skipped" ]; then
            echo "FAIL: action was skipped unexpectedly"
            exit 1
          fi
          echo "PASS: action ran (outcome: ${{ steps.action.outcome }})"
